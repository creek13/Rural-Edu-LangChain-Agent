<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习助手</title>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            options: {
                enableMenu: false
            }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f5f7fa; }
        header { background: #2f80ed; color: white; padding: 16px; text-align: center; font-size: 20px; font-weight: bold; }
        .container { padding: 12px; max-width: 800px; margin: 0 auto; }
        .intro { background: white; padding: 15px; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #chat-window { width: 100%; height: 70vh; border-radius: 10px; overflow: hidden; background: white; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>📚 学习助手</header>

<div class="container">
    <div class="intro">👋 欢迎！遇到数学题请直接提问，我会帮你理解。</div>
    <div id="chat-window"></div>
</div>

<script>
 window.difyChatbotConfig = {
  token: 'eK0GTxcReGIleskx',
  container: '#chat-window',
 }
</script>
<script src="https://udify.app/embed.min.js" id="eK0GTxcReGIleskx" defer></script>

<script>
    // 这是一个“监视器”，每隔 1 秒检查一次页面，发现新公式就渲染
    setInterval(() => {
        if (window.MathJax && window.MathJax.typesetPromise) {
            window.MathJax.typesetPromise();
        }
    }, 1500);
</script>

</body>
</html>
