<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习助手</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background-color: #f5f7fa;
            color: #333;
        }

        header {
            background-color: #2f80ed;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .container {
            padding: 12px;
        }

        .intro {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .tips {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .chat-container {
            width: 100%;
            height: 75vh;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>
    📚 学习助手
</header>

<div class="container">

    <div class="intro">
        👋 欢迎使用学习助手

        <div class="tips">
            👉 遇到不会的题，可以直接问<br>
            👉 尝试回答AI的问题，会更容易学会<br>
            👉 不要只看答案，试着自己做一遍
        </div>
    </div>

    <div class="chat-container">
        <iframe src="https://udify.app/chatbot/eK0GTxcReGIleskx"></iframe>
    </div>

    <footer>
        🌱 希望它能帮你学会一题
    </footer>

</div>

</body>
</html>
