    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f5f7fa; }
        header { background: #2f80ed; color: white; padding: 16px; text-align: center; font-size: 20px; font-weight: bold; }
        .container { padding: 12px; max-width: 800px; margin: 0 auto; }
        #chat-window { width: 100%; height: 75vh; border-radius: 10px; overflow: hidden; background: white; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>📚 学习助手</header>

<div class="container">
    <div id="chat-window"></div>
</div>

<script>
 window.difyChatbotConfig = {
  token: 'eK0GTxcReGIleskx',
  container: '#chat-window',
 }
</script>
<script src="https://udify.app/embed.min.js" id="eK0GTxcReGIleskx" defer></script>

<script>
    // 2. 核心：每秒强制扫描并渲染
    function forceRenderMath() {
        if (window.renderMathInElement) {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError : false
            });
        }
    }

    // AI 蹦字很快，我们每 500 毫秒检查一次
    setInterval(forceRenderMath, 500);
</script>

</body>
